<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>History - Orient Casino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/assets/favicon_main_page.png">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">OrientCasino</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="#" class="go-slots">Slots</a>
  </nav>

  <div class="auth" id="authBox">
    <a class="btn ghost login-link" href="login.html">Log in</a>
    <a class="btn primary login-link" href="login.html?mode=register">Sign up</a>
  </div>
</header>

<section class="history-container">
  <div class="history-header">
    <h1>Game history</h1>

    <button id="clearHistoryBtn" class="btn ghost">
      Clear History
    </button>
  </div>

  <div class="history-wrapper">
    <table class="history-table">
      <thead>
        <tr>
          <th>Game</th>
          <th>Bet</th>
          <th>Result</th>
          <th>Win</th>
          <th>Balance</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="historyBody">
        <tr>
          <td colspan="6" class="history-empty">⏳ Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<footer>
  © 2026 OrientCasino · 18+
</footer>

<script src="/static/js/main.js"></script>
<script src="/static/js/history.js"></script>

</body>
</html>
