<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Neon Casino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<div id="authModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2 id="modalTitle">Logowanie</h2>
    <form id="authForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Hasło" required>
      <button type="submit" class="btn primary big" id="submitAuth">Zaloguj się</button>
    </form>
    <p id="toggleText">Nie masz konta? <a href="#" id="switchToRegister">Zarejestruj się</a></p>
  </div>
</div>
<body>

<header class="topbar">
  <div class="logo">🎰 NeonCasino</div>
  <nav>
    <a href="#">Slots</a>
    <a href="#">Live</a>
    <a href="#">Sports</a>
    <a href="#">Esports</a>
    <a href="#">VIP</a>
  </nav>
  <div class="auth">
    <button class="btn ghost">Zaloguj</button>
    <button class="btn primary">Rejestracja</button>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>NOWE SLOTY<br><span>WIELKIE WYGRANE</span></h1>
    <p>Wejdź do gry i zgarnij jackpot. Bonusy czekają.</p>
    <button class="btn primary big">Zagraj teraz</button>
  </div>

  <div class="hero-image">
    <img id="heroImg" src="assets/hero.jpg" alt="Casino Mascot">
  </div>
</section>

<section class="categories">
  <div class="card">🎰<span>Casino</span></div>
  <div class="card">🎲<span>Live Casino</span></div>
  <div class="card">⚽<span>Sports</span></div>
  <div class="card">🎮<span>Esports</span></div>
  <div class="card">💣<span>Crash</span></div>
  <div class="card">📺<span>TV Games</span></div>
</section>

<footer>
  © 2026 NeonCasino · 18+
</footer>

<script src="main.js"></script>
</body>
</html>
