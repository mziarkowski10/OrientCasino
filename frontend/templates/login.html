<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Neon Casino - Logowanie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .auth-container {
      background: rgba(0,0,0,0.8);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
      text-align: center;
    }
    .auth-container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #00ffff;
    }
    .auth-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }
    .auth-container .btn {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn.primary {
      background: #00ffff;
      color: #000;
    }
    .btn.primary:hover {
      background: #00cccc;
    }
    .btn.ghost {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
    }
    .btn.ghost:hover {
      background: #00ffff;
      color: #000;
    }
    .toggle-btns {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .toggle-btns button {
      flex: 1;
      margin: 0 5px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="toggle-btns">
    <button id="loginToggle" class="btn ghost">Logowanie</button>
    <button id="registerToggle" class="btn ghost">Rejestracja</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <h2>Logowanie</h2>
    <input id="loginUsername" type="text" placeholder="Nazwa użytkownika" required>
    <input id="loginPassword" type="password" placeholder="Hasło" required>
    <button type="submit" class="btn primary">Zaloguj</button>
  </form>

  <!-- REGISTER -->
  <form id="registerForm" class="hidden">
    <h2>Rejestracja</h2>
    <input id="regUsername" type="text" placeholder="Nazwa użytkownika" required>
    <input id="regEmail" type="email" placeholder="Email" required>
    <input id="regPassword" type="password" placeholder="Hasło" required>
    <input id="regPassword2" type="password" placeholder="Powtórz hasło" required>
    <button type="submit" class="btn primary">Zarejestruj</button>
  </form>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginToggle = document.getElementById('loginToggle');
  const registerToggle = document.getElementById('registerToggle');

  loginToggle.addEventListener('click', () => {
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  });

  registerToggle.addEventListener('click', () => {
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;

    const res = await fetch("http://127.0.0.1:5000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    alert(data.message || (data.success ? "Zalogowano!" : "Błąd logowania"));
    if (data.success) {
      localStorage.setItem("player_id", data.player_id);
      window.location.href = "game.html";
    }
  });

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const password2 = document.getElementById('regPassword2').value;

    if (password !== password2) {
      alert("Hasła się nie zgadzają!");
      return;
    }

    const res = await fetch("http://127.0.0.1:5000/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();
    alert(data.message);
    if (data.success) {
      registerForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
    }
  });
</script>

</body>
</html>
