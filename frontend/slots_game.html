<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Slots - Orient Casino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/assets/favicon_main_page.png">
</head>

<body>

<header class="topbar">
  <a href="index.html" class="logo">OrientCasino</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="history.html">Historia</a>
  </nav>

  <div class="auth" id="authBox">
    <span id="balanceDisplay">Saldo: ...</span>
    <a class="btn ghost login-link" href="login.html">Zaloguj</a>
    <a class="btn primary login-link" href="login.html?mode=register">Rejestracja</a>
  </div>
</header>

<div class="slots-container">
  <h1>SLOTY</h1>

  <div class="slots">
    <div class="slot"><div class="reel" id="reel1"></div></div>
    <div class="slot"><div class="reel" id="reel2"></div></div>
    <div class="slot"><div class="reel" id="reel3"></div></div>
  </div>

  <div class="controls">
    <input type="number" id="bet" placeholder="Kwota" min="10" step="0.01">
    <button class="btn primary" id="spinBtn">SPIN</button>
  </div>

  <div class="result" id="resultText"></div>
</div>

<script src="/static/js/main.js"></script>
<script src="/static/js/slots.js"></script>

</body>
</html>
