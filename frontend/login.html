<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Orient Casino - Logowanie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/assets/favicon_main_page.png">
</head>
<body class="auth-page">

<header class="topbar">
  <a href="index.html" class="logo">OrientCasino</a>
</header>

<div class="auth-wrapper">
  <div class="auth-container">

    <div class="toggle-btns">
      <button id="loginToggle" class="btn ghost">Logowanie</button>
      <button id="registerToggle" class="btn ghost">Rejestracja</button>
    </div>

    <form id="loginForm">
      <h2>Logowanie</h2>
      <input id="loginUsername" type="text" placeholder="Nazwa użytkownika" required>
      <input id="loginPassword" type="password" placeholder="Hasło" required>
      <button type="submit" class="btn primary">Zaloguj</button>
    </form>

    <form id="registerForm" class="hidden">
      <h2>Rejestracja</h2>
      <input id="regUsername" type="text" placeholder="Nazwa użytkownika" required>
      <input id="regEmail" type="email" placeholder="Email" required>
      <input id="regPassword" type="password" placeholder="Hasło" required>
      <input id="regPassword2" type="password" placeholder="Powtórz hasło" required>
      <button type="submit" class="btn primary">Zarejestruj</button>
    </form>

  </div>
</div>

<script src="/static/js/auth.js" defer></script>

</body>
</html>
