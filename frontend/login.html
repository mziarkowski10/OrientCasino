<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Orient Casino - Logowanie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="icon" href="static/assets/favicon_main_page.png">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* 🔥 LOGO */
    .logo {
      margin-top: 40px;
      font-size: 26px;
      font-weight: 700;
      color: #ff3cac;
      text-decoration: none;
    }

    .auth-container {
      margin-top: 40px;
      background: rgba(0,0,0,0.8);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
      text-align: center;
    }

    .auth-container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #00ffff;
    }

    .auth-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    .auth-container .btn {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn.primary {
      background: #00ffff;
      color: #000;
    }

    .btn.primary:hover {
      background: #00cccc;
    }

    .btn.ghost {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
    }

    .btn.ghost:hover {
      background: #00ffff;
      color: #000;
    }

    .toggle-btns {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toggle-btns button {
      flex: 1;
      margin: 0 5px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<!-- 🔥 LOGO → STRONA GŁÓWNA -->
<a href="index.html" class="logo">🎰 OrientCasino</a>

<div class="auth-container">
  <div class="toggle-btns">
    <button id="loginToggle" class="btn ghost">Logowanie</button>
    <button id="registerToggle" class="btn ghost">Rejestracja</button>
  </div>

  <form id="loginForm">
    <h2>Logowanie</h2>
    <input id="loginUsername" type="text" placeholder="Nazwa użytkownika" required>
    <input id="loginPassword" type="password" placeholder="Hasło" required>
    <button type="submit" class="btn primary">Zaloguj</button>
  </form>

  <form id="registerForm" class="hidden">
    <h2>Rejestracja</h2>
    <input id="regUsername" type="text" placeholder="Nazwa użytkownika" required>
    <input id="regEmail" type="email" placeholder="Email" required>
    <input id="regPassword" type="password" placeholder="Hasło" required>
    <input id="regPassword2" type="password" placeholder="Powtórz hasło" required>
    <button type="submit" class="btn primary">Zarejestruj</button>
  </form>
</div>

<script>
const API_URL = "";

const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const loginToggle = document.getElementById('loginToggle');
const registerToggle = document.getElementById('registerToggle');

loginToggle.addEventListener('click', () => {
  loginForm.classList.remove('hidden');
  registerForm.classList.add('hidden');
});

registerToggle.addEventListener('click', () => {
  registerForm.classList.remove('hidden');
  loginForm.classList.add('hidden');
});

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;

  try {
    const res = await fetch(`${API_URL}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Błąd logowania");
      return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("player_id", data.player_id);

    window.location.href = "slots_game.html";

  } catch {
    alert("Brak połączenia z serwerem");
  }
});

registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;

  if (password !== password2) {
    alert("Hasła się nie zgadzają!");
    return;
  }

  try {
    const res = await fetch(`${API_URL}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Błąd rejestracji");
      return;
    }

    alert("Konto utworzone!");
    registerForm.classList.add('hidden');
    loginForm.classList.remove('hidden');

  } catch {
    alert("Brak połączenia z serwerem");
  }
});
</script>

</body>
</html>
