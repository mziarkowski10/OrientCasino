<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Orient Casino - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/assets/favicon_main_page.png">
</head>
<body class="auth-page">

<header class="topbar">
  <a href="index.html" class="logo">OrientCasino</a>
</header>

<div class="auth-wrapper">
  <div class="auth-container">

    <div class="toggle-btns">
      <button id="loginToggle" class="btn ghost">Log in</button>
      <button id="registerToggle" class="btn ghost">Sign up</button>
    </div>

    <form id="loginForm">
      <h2>Login</h2>

      <input id="loginUsername" type="text" placeholder="Username" required>

      <div class="password-wrapper">
        <input id="loginPassword" type="password" placeholder="Password" required>

        <span class="toggle-password" data-target="loginPassword">
          <svg class="eye open" viewBox="0 0 24 24">
            <path d="M12 5C7 5 3 12 3 12s4 7 9 7 9-7 9-7-4-7-9-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>

          <svg class="eye closed hidden" viewBox="0 0 24 24">
            <path d="M3 3l18 18"/>
            <path d="M10.6 10.6A3 3 0 0012 15a3 3 0 002.4-4.4"/>
            <path d="M9.9 5.2A9.7 9.7 0 0112 5c5 0 9 7 9 7a17.3 17.3 0 01-3.2 3.8"/>
            <path d="M6.5 6.5A17.6 17.6 0 003 12s4 7 9 7c1.6 0 3-.4 4.2-1"/>
          </svg>
        </span>
      </div>

      <button type="submit" class="btn primary">Log in</button>
    </form>

    <form id="registerForm" class="hidden">
      <h2>Sign up</h2>

      <input id="regUsername" type="text" placeholder="Username" required>
      <input id="regEmail" type="email" placeholder="Email" required>

      <div class="password-wrapper">
        <input id="regPassword" type="password" placeholder="Password" required>

        <span class="toggle-password" data-target="regPassword">
          <svg class="eye open" viewBox="0 0 24 24">
            <path d="M12 5C7 5 3 12 3 12s4 7 9 7 9-7 9-7-4-7-9-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="eye closed hidden" viewBox="0 0 24 24">
            <path d="M3 3l18 18"/>
            <path d="M10.6 10.6A3 3 0 0012 15a3 3 0 002.4-4.4"/>
            <path d="M9.9 5.2A9.7 9.7 0 0112 5c5 0 9 7 9 7a17.3 17.3 0 01-3.2 3.8"/>
            <path d="M6.5 6.5A17.6 17.6 0 003 12s4 7 9 7c1.6 0 3-.4 4.2-1"/>
          </svg>
        </span>
      </div>

      <div class="password-wrapper">
        <input id="regPassword2" type="password" placeholder="Confirm password" required>

        <span class="toggle-password" data-target="regPassword2">
          <svg class="eye open" viewBox="0 0 24 24">
            <path d="M12 5C7 5 3 12 3 12s4 7 9 7 9-7 9-7-4-7-9-7z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="eye closed hidden" viewBox="0 0 24 24">
            <path d="M3 3l18 18"/>
            <path d="M10.6 10.6A3 3 0 0012 15a3 3 0 002.4-4.4"/>
            <path d="M9.9 5.2A9.7 9.7 0 0112 5c5 0 9 7 9 7a17.3 17.3 0 01-3.2 3.8"/>
            <path d="M6.5 6.5A17.6 17.6 0 003 12s4 7 9 7c1.6 0 3-.4 4.2-1"/>
          </svg>
        </span>
      </div>

      <button type="submit" class="btn primary">Sign up</button>
    </form>

  </div>
</div>

<script src="/static/js/auth.js" defer></script>

</body>
</html>
