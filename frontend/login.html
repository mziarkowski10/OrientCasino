<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Neon Casino - Logowanie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Dodatkowy styl dla logowania/rejestracji */
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .auth-container {
      background: rgba(0,0,0,0.8);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
      text-align: center;
    }

    .auth-container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #00ffff;
    }

    .auth-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    .auth-container .btn {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn.primary {
      background: #00ffff;
      color: #000;
    }

    .btn.primary:hover {
      background: #00cccc;
    }

    .btn.ghost {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
    }

    .btn.ghost:hover {
      background: #00ffff;
      color: #000;
    }

    .toggle-btns {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toggle-btns button {
      flex: 1;
      margin: 0 5px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="toggle-btns">
    <button id="loginToggle" class="btn ghost">Logowanie</button>
    <button id="registerToggle" class="btn ghost">Rejestracja</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <h2>Logowanie</h2>
    <input type="text" placeholder="Nazwa użytkownika" required>
    <input type="password" placeholder="Hasło" required>
    <button type="submit" class="btn primary">Zaloguj</button>
  </form>

  <!-- REGISTER -->
  <form id="registerForm" class="hidden">
    <h2>Rejestracja</h2>
    <input type="text" placeholder="Nazwa użytkownika" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Hasło" required>
    <input type="password" placeholder="Powtórz hasło" required>
    <button type="submit" class="btn primary">Zarejestruj</button>
  </form>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const loginToggle = document.getElementById('loginToggle');
  const registerToggle = document.getElementById('registerToggle');

  loginToggle.addEventListener('click', () => {
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  });

  registerToggle.addEventListener('click', () => {
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
  });

  // Tutaj możesz dodać obsługę wysyłki formularzy do API
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    alert("Logowanie (tutaj połącz z API)!");
  });

  registerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    alert("Rejestracja (tutaj połącz z API)!");
  });
</script>

</body>
</html>
